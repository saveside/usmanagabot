name: Build and Push Docker Images

on:
  push:
    branches:
      - 'unstable'
      - 'testing'
    tags:
      - 'usmanagabot:*'

env:
  REPOWN: ${{ github.repository_owner }}
  REPO: ${{ github.repository }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - runs-on: ubuntu-latest
            platform: linux/amd64
            targetarch: Linux_x86_64
          - runs-on: ubuntu-24.04-arm
            platform: linux/arm64
            targetarch: Linux_arm64

    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract branch name
        shell: bash
        run: echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT
        id: extract_branch

      - name: Get latest tag
        id: latest_tag
        run: |
          TAG=$(curl -s https://api.github.com/repos/${{ env.REPO }}/tags | jq -r '.[0].name')
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "LATEST_TAG=${TAG}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPO }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (branch-specific)
        id: build_branch
        if: github.ref_type == 'branch' && (github.ref == 'refs/heads/unstable' || github.ref == 'refs/heads/testing')
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.REPO }}
          file: Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ghcr.io/${{ env.REPO }}:usmanagabot-${{ steps.extract_branch.outputs.branch }}-${{ github.sha }}

      - name: Build and push image (main branch, tag-specific)
        id: build_tag
        if: github.ref_type == 'tag'
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.REPO }}
          file: Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ghcr.io/${{ env.REPO }}:usmanagabot-${{ github.ref_name }}

      - name: Export digest to file
        run: |
          mkdir -p ${{ runner.temp }}/digests
          echo "${{ steps.build_branch.outputs.digest || steps.build_tag.outputs.digest }}" > "${{ runner.temp }}/digests/${{ matrix.targetarch }}.digest"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.targetarch }}
          path: ${{ runner.temp }}/digests/*
          retention-days: 1

      outputs:
        latest_tag: ${{ steps.latest_tag.outputs.LATEST_TAG }}

  merge:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v6
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPO }}
          tags: |
            type=raw,value=latest,enable=true
            type=raw,value=usmanagabot-latest,enable=true
            type=raw,value=${{ needs.build.outputs.latest_tag }},enable=true  # Use the latest tag from build

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ env.REPO }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/${{ env.REPO }}:latest

  create-release:
    needs: [build, merge]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      LATEST_TAG: ${{ needs.build.outputs.latest_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Create and push tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag ${{ env.LATEST_TAG }} || true 
          git push origin ${{ env.LATEST_TAG }} || true
          gh release create ${{ env.LATEST_TAG }} --generate-notes || true

